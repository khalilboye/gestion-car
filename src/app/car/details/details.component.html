<h2>Employee Details</h2>

<hr/>
<div *ngIf="car">
  <div>
    <label><b>id: </b></label> {{car.id}}
  </div>
  <div>
    <label><b>Libelle: </b></label> {{car.libelle}}
  </div>
  <div>
    <label><b>Modele: </b></label> {{car.modele}}
  </div>
  <div>
    <label><b>Marque: </b></label> {{car.marque}}
  </div>
  <div>
    <label><b>Date : </b></label> {{car.dateMiseCirculation}}
  </div>
</div>

<br>
<br>
<button (click)="list()" class="btn btn-primary">Back to Employee List</button><br>
