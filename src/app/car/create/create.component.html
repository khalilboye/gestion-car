<h3>Create Employee</h3>
<div [hidden]="submitted" style="width: 400px;">
  <form (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="libelle">Libelle Vehicule</label>
      <input type="text" class="form-control" id="libelle" required [(ngModel)]="car.libelle" name="firstName">
    </div>

    <div class="form-group">
      <label for="marque">Marque vehicule</label>
      <input type="text" class="form-control" id="marque" required [(ngModel)]="car.marque" name="lastName">
    </div>

    <div class="form-group">
      <label for="modele">Modele Vehicule</label>
      <input type="text" class="form-control" id="modele" required [(ngModel)]="car.modele" name="emailId">
    </div>
    <div class="form-group">
      <label for="dateMiseCirculation">dateMise Circulation</label>
      <input type="date" class="form-control" id="dateMiseCirculation" required [(ngModel)]="car.dateMiseCirculation" name="emailId">
    </div>

    <button type="submit" class="btn btn-success">Submit</button>
  </form>
</div>

<div [hidden]="!submitted">
  <h4>You submitted successfully!</h4>
  <!-- <button class="btn btn-success" (click)="newEmployee()">Add</button> -->
</div>
